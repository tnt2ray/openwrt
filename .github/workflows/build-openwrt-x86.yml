name: Build OpenWrt x86-64

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".config"
      - "files/**"
      - ".github/workflows/build-openwrt-x86.yml"

concurrency:
  group: openwrt-x86-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout OpenWrt fork
        uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils \
            python3-setuptools rsync swig unzip zlib1g-dev file wget jq

      - name: Cache downloads
        uses: actions/cache@v6
        with:
          path: dl
          key: openwrt-dl-${{ runner.os }}-${{ hashFiles('feeds.conf.default', '.config') }}
          restore-keys: |
            openwrt-dl-${{ runner.os }}-

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate final config
        run: |
          test -f .config
          make defconfig
          grep -Fx 'CONFIG_GRUB_EFI_IMAGES=y' .config
          grep -Fx 'CONFIG_GRUB_CONSOLE=y' .config
          grep -Fx 'CONFIG_TARGET_SERIAL=""' .config
          grep -Fx 'CONFIG_GRUB_TIMEOUT="1"' .config
          ./scripts/diffconfig.sh > build.diffconfig
          cat build.diffconfig

      - name: Download sources
        run: |
          make -j"$(nproc)" download

      - name: Build firmware
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Validate EFI GRUB auto-boot
        run: |
          set -eux
          img="$(find bin/targets/x86/64 -maxdepth 1 -name '*combined-efi.img.gz' | sort | head -n 1)"
          test -n "$img"
          workdir="$(mktemp -d)"
          loopdev=""
          cleanup() {
            set +e
            sudo umount "$workdir/boot" 2>/dev/null
            if [ -n "$loopdev" ]; then
              sudo losetup -d "$loopdev" 2>/dev/null
            fi
            rm -rf "$workdir"
          }
          trap cleanup EXIT
          gunzip -c "$img" > "$workdir/openwrt.img"
          loopdev="$(sudo losetup --find --show --partscan "$workdir/openwrt.img")"
          mkdir -p "$workdir/boot"
          sudo mount "${loopdev}p1" "$workdir/boot"
          sudo sed -n '1,80p' "$workdir/boot/boot/grub/grub.cfg"
          sudo grep -Fx 'set default="0"' "$workdir/boot/boot/grub/grub.cfg"
          sudo grep -Fx 'set timeout="1"' "$workdir/boot/boot/grub/grub.cfg"
          sudo grep -F 'terminal_input console; terminal_output console' "$workdir/boot/boot/grub/grub.cfg"
          ! sudo grep -E '(^|[ ;])serial([ ;]|$)' "$workdir/boot/boot/grub/grub.cfg"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-x86-64-efi
          path: |
            bin/targets/x86/64/*.img.gz
            bin/targets/x86/64/*.manifest
            bin/targets/x86/64/*.buildinfo
            bin/targets/x86/64/sha256sums
            build.diffconfig
