name: Build OpenWrt x86-64

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".config"
      - "files/**"
      - ".github/workflows/build-openwrt-x86.yml"

concurrency:
  group: openwrt-x86-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout OpenWrt fork
        uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils \
            python3-setuptools rsync swig unzip zlib1g-dev file wget jq

      - name: Cache downloads
        uses: actions/cache@v6
        with:
          path: dl
          key: openwrt-dl-${{ runner.os }}-${{ hashFiles('feeds.conf.default', '.config') }}
          restore-keys: |
            openwrt-dl-${{ runner.os }}-

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate final config
        run: |
          test -f .config
          make defconfig
          grep -Fx 'CONFIG_GRUB_EFI_IMAGES=y' .config
          grep -Fx 'CONFIG_GRUB_CONSOLE=y' .config
          grep -Fx 'CONFIG_TARGET_SERIAL="ttyS0"' .config
          grep -Fx 'CONFIG_GRUB_BAUDRATE=115200' .config
          grep -Fx 'CONFIG_GRUB_TIMEOUT="1"' .config
          ./scripts/diffconfig.sh > build.diffconfig
          cat build.diffconfig

      - name: Download sources
        run: |
          make -j"$(nproc)" download

      - name: Build firmware
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Validate EFI GRUB auto-boot
        run: |
          set -eux
          found=0
          while IFS= read -r img; do
            found=1
            workdir="$(mktemp -d)"
            loopdev=""
            cleanup_img() {
              set +e
              sudo umount "$workdir/boot" 2>/dev/null
              if [ -n "$loopdev" ]; then
                sudo losetup -d "$loopdev" 2>/dev/null
              fi
              rm -rf "$workdir"
              set -e
            }
            trap cleanup_img EXIT
            gunzip -c "$img" > "$workdir/openwrt.img"
            loopdev="$(sudo losetup --find --show --partscan "$workdir/openwrt.img")"
            mkdir -p "$workdir/boot"
            sudo mount "${loopdev}p1" "$workdir/boot"
            echo "Checking $img"
            sudo sed -n '1,80p' "$workdir/boot/boot/grub/grub.cfg"
            sudo grep -Fx 'set default="0"' "$workdir/boot/boot/grub/grub.cfg"
            sudo grep -Fx 'set timeout="1"' "$workdir/boot/boot/grub/grub.cfg"
            sudo grep -F 'terminal_input console serial; terminal_output console serial' "$workdir/boot/boot/grub/grub.cfg"
            sudo grep -F 'serial --unit=0 --speed=115200' "$workdir/boot/boot/grub/grub.cfg"
            ! sudo grep -Fx 'set timeout="0"' "$workdir/boot/boot/grub/grub.cfg"
            cleanup_img
            trap - EXIT
          done < <(find bin/targets/x86/64 -maxdepth 1 -name '*combined-efi.img.gz' | sort)
          test "$found" -eq 1

      - name: Upload ext4 EFI image
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-x86-64-generic-ext4-combined-efi.img.gz
          path: bin/targets/x86/64/openwrt-x86-64-generic-ext4-combined-efi.img.gz
          if-no-files-found: error
          archive: false

      - name: Upload ext4 BIOS image
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-x86-64-generic-ext4-combined.img.gz
          path: bin/targets/x86/64/openwrt-x86-64-generic-ext4-combined.img.gz
          if-no-files-found: error
          archive: false

      - name: Upload ext4 rootfs
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-x86-64-generic-ext4-rootfs.img.gz
          path: bin/targets/x86/64/openwrt-x86-64-generic-ext4-rootfs.img.gz
          if-no-files-found: error
          archive: false

      - name: Upload squashfs EFI image
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-x86-64-generic-squashfs-combined-efi.img.gz
          path: bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined-efi.img.gz
          if-no-files-found: error
          archive: false

      - name: Upload squashfs BIOS image
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-x86-64-generic-squashfs-combined.img.gz
          path: bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz
          if-no-files-found: error
          archive: false

      - name: Upload squashfs rootfs
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-x86-64-generic-squashfs-rootfs.img.gz
          path: bin/targets/x86/64/openwrt-x86-64-generic-squashfs-rootfs.img.gz
          if-no-files-found: error
          archive: false
